# CHARON

- type: entity
  id: ShipRailgunProjectile
  name: M381 CHARON 280mm 75.25 kg slug
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 50000
        Blunt: 12500
        Heat: 5000
        Ion: 12500
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
  - type: Ammo
    muzzleFlash: null
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#CF0E0E"
    scale: 4
    requireNoGrid: true
    shape: triangle
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    color: "#19AFFF"
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: PowerSink
    totalIntensity: 6000
    intensitySlope: 8
    maxIntensity: 6000
  - type: GatheringProjectile

