# ASM Vanyk

- type: entity
  id: WeaponShuttleMissileVanyk
  suffix: Shuttle, Missile
  name: ASM Vanyk missile launcher
  parent: BallisticArtillery
  description: ASM-302 Vanyk basic guided missile pod. Can be remotely activated, or linked up to a GCS.
  components:
  - type: StaticPrice
    price: 5000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/vanyk.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: AmmoCounter
  - type: Battery
    maxCharge: 40000
    startingCharge: 40000
  - type: ExaminableBattery
  - type: WirelessNetworkConnection
    range: 500
  - type: Gun
    fireRate: 0.2 #CorvaxGoob-ShuttleGuns-Rebalance
    projectileSpeed: 50
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rocket_launcher.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 60
  - type: Actions
  - type: ProjectileBatteryAmmoProvider
    proto: ShipMissileASM302
    fireCost: 300
  - type: SpaceArtillery
    powerChargeRate: 350
    powerUsePassive: 600
    powerUseActive: 0
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadarBlip
    radarColor: "#FCBA03"
    scale: 1.5
  - type: ShipGunType
    shipType: Missile
  - type: ShipGunClass
    shipClass: Medium

