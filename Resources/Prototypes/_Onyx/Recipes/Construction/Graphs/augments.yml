- type: constructionGraph
  id: AugmentBioReactor
  start: start
  graph:
  - node: start
    edges:
    - to: casing
      steps:
      - tag: AugmentBioReactorCasing
        name: construction-graph-tag-casing
        icon:
          sprite: _Shitmed/Objects/Augments/power.rsi
          state: incomplete_charger
  - node: casing
    entity: AugmentBioReactorCasing
    edges:
    - to: cables
      steps:
      - material: Cable
        amount: 2
  - node: cables
    entity: AugmentBioReactorCables
    edges:
    - to: bioreactor
      steps:
      - material: Plastic
        amount: 2
      - material: Glass
        amount: 2
      - material: Gold
        amount: 1
      - material: Steel
        amount: 2
  - node: bioreactor
    entity: AugmentBioReactor

