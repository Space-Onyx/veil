- type: constructionGraph
  id: ZPipeUp
  start: start
  graph:
    - node: start
      edges:
        - to: pipe
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Steel
              amount: 3
              doAfter: 2

    - node: pipe
      entity: UtopiaGasZPipeStraightUp
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
            - !type:DeleteEntity
          steps:
            - tool: Welding
              doAfter: 2

