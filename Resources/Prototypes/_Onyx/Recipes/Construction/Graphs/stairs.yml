- type: constructionGraph
  id: StairsZLevelSteel
  start: start
  graph:
    - node: start
      edges:
        - to: stairs
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Steel
              amount: 4
              doAfter: 4

    - node: stairs
      entity: StairsZLevel
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 4
            - !type:DeleteEntity
          steps:
            - tool: Welding
              doAfter: 3

