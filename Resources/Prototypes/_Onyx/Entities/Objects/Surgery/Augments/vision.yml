- type: entity
  parent: BaseOnyxBrainAugment
  id: AugmentVisionChemical
  name: Medical HUD implant
  description: A cybernetic brain implant that provides the functionality of a medical HUD.
  components:
  - type: AugmentVision
    overlayTypes:
    - HealthBars
    - HealthIcons
    - DiseaseIcons
    healthBarDamageContainers:
    - Biological
    healthIconDamageContainers:
    - Biological
    powerDraw: 3
  - type: AugmentNeuroLoad
    passiveLoad: 2
  - type: AugmentEmp
  - type: AugmentExamine
    visible: false
  - type: Tag
    tags:
    - Augment
    - brainAugment
    - AugmentVision

