- type: entity
  parent: BaseAugmentAction
  id: ActionAugmentToggleItemPanel
  name: Toggle item panel
  description: Deploy or retract the built-in item
  components:
  - type: InstantAction
    event: !type:AugmentActionEvent

- type: entity
  abstract: true
  parent: BaseArmAugment
  id: BaseAugmentItemPanel
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/arm.rsi
    state: base
  - type: ItemToggle
    activated: false
    onUse: false
    onActivate: false
  - type: AugmentEmp
  - type: AugmentExamine
    color: "#5bcefa"
    examineText: augment-examine-item-panel
    visible: true

- type: entity
  parent: BaseAugmentItemPanel
  id: AugmentManitBladePanel
  name: mantis blade panel augment
  description: An arm implant containing a mantis blade. Compatible with both arms.
  components:
  - type: Sprite
    state: engineering
  - type: AugmentItemPanel
    itemPrototype: MantisBlade
    extendPowerCost: 3.5
    retractPowerCost: 3
    equippedNeuroLoad: 2
    icon: { sprite: _Goobstation/Objects/Weapons/Melee/mantis_blade.rsi, state: icon }
    extendSound: { collection: MantisBladeRetract }
    retractSound: { collection: MantisBladeRetract }
    extendHeldPrefix: popout
    extendHeldPrefixDuration: 0.3
  - type: AugmentExamine
    examineText: augment-examine-mantis-blade-panel
  - type: AugmentNeuroLoad
    passiveLoad: 2.5

- type: entity
  parent: WeaponDisabler
  id: WeaponDisablerAugmentSelfCharging
  name: implant disabler
  description: A disabler modified to slowly self-recharge while deployed from an implant.
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10

- type: entity
  parent: Stunbaton
  id: StunbatonAugmentSelfCharging
  name: implant stun baton
  description: A stun baton modified to slowly self-recharge while deployed from an implant.
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10

- type: entity
  parent: BaseAugmentItemPanel
  id: AugmentStunnerPanel
  name: stunner panel augment
  description: An arm implant containing a stunner. Compatible with both arms.
  components:
  - type: Sprite
    state: strength
  - type: AugmentItemPanel
    itemPrototype: WeaponDisablerAugmentSelfCharging
    extendPowerCost: 2.5
    retractPowerCost: 3.5
    equippedNeuroLoad: 1.5
    icon: { sprite: Objects/Weapons/Guns/Battery/disabler.rsi, state: base }
  - type: AugmentExamine
    examineText: augment-examine-stunner-panel
  - type: AugmentNeuroLoad
    passiveLoad: 1.5

- type: entity
  parent: BaseAugmentItemPanel
  id: AugmentStunbatonPanel
  name: stunbaton panel augment
  description: An arm implant containing a stun baton. Compatible with both arms.
  components:
  - type: Sprite
    state: strength
  - type: AugmentItemPanel
    itemPrototype: StunbatonAugmentSelfCharging
    extendPowerCost: 2.5
    retractPowerCost: 1.5
    equippedNeuroLoad: 1.5
    icon: { sprite: Objects/Weapons/Melee/stunbaton.rsi, state: stunbaton_off }
  - type: AugmentExamine
    examineText: augment-examine-stunbaton-panel
  - type: AugmentNeuroLoad
    passiveLoad: 2

- type: entity
  parent: BaseAugmentItemPanel
  id: AugmentLaserPistolPanel
  name: laser pistol panel augment
  description: An arm implant containing a self-recharging laser pistol. Compatible with both arms.
  components:
  - type: Sprite
    state: strength
  - type: AugmentItemPanel
    itemPrototype: WeaponAdvancedLaser
    extendPowerCost: 3.5
    retractPowerCost: 3
    equippedNeuroLoad: 2
    icon: { sprite: Objects/Weapons/Guns/Battery/advancedlasergun.rsi, state: base }
  - type: AugmentExamine
    examineText: augment-examine-laser-pistol-panel
  - type: AugmentNeuroLoad
    passiveLoad: 2.5
