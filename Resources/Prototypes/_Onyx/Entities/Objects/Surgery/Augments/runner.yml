- type: entity
  abstract: true
  parent: BaseAugment
  id: BaseRunnerAugment
  name: runner
  description: A cybernetic leg implant. Increases walk and sprint speed by ~10%.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: cell
  - type: Item
    size: Huge
  - type: AugmentMovementSpeed
    walkMultiplier: 1.04
    sprintMultiplier: 1.04
    powerDraw: 1
  - type: AugmentEmp

- type: entity
  parent: BaseRunnerAugment
  id: RunnerAugment
  name: runner augment
  description: A cybernetic leg implant. Increases walk and sprint speed by ~10%.
  components:
  - type: AugmentMovementSpeed
    walkMultiplier: 1.10
    sprintMultiplier: 1.10
    powerDraw: 2
    augmentId: Runner
  - type: Organ
    slotId: legImplant
    toolName: surgery-tool-augment-target-leg
  - type: AugmentExamine
    color: "#974cf9"
    examineText: augment-examine-runner
    visible: true
  - type: Tag
    tags:
    - LegAugment
    - Augment
    - AugmentMobility
  - type: AugmentNeuroLoad
    passiveLoad: 1

- type: entity
  parent: BaseRunnerAugment
  id: AdvancedRunnerAugment
  name: advanced runner augment
  description: An advanced cybernetic leg implant. Increases walk and sprint speed by ~25%.
  components:
  - type: Sprite
    state: cell
  - type: AugmentMovementSpeed
    walkMultiplier: 1.25
    sprintMultiplier: 1.25
    powerDraw: 4
    augmentId: AdvancedRunner
  - type: Organ
    slotId: legImplant
    toolName: surgery-tool-augment-target-leg
  - type: AugmentExamine
    examineText: augment-examine-runner-advanced
    visible: true
  - type: AugmentNeuroLoad
    passiveLoad: 1.5
  - type: Tag
    tags:
    - LegAugment
    - Augment
    - AugmentMobility
