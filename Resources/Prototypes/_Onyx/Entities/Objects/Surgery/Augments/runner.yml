- type: entity
  abstract: true
  parent: BaseAugment
  id: BaseRunnerAugment
  name: runner
  description: A cybernetic leg implant. Increases walk and sprint speed by ~10%.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
    state: cell
  - type: Item
    size: Huge
  - type: AugmentMovementSpeed
    walkMultiplier: 1.04
    sprintMultiplier: 1.04

- type: entity
  parent: BaseRunnerAugment
  id: RunnerAugmentLeft
  name: left runner augment
  description: A cybernetic leg implant. Increases walk and sprint speed by ~10%.
  components:
  - type: AugmentMovementSpeed
    walkMultiplier: 1.10
    sprintMultiplier: 1.10
    augmentId: RunnerLeft
  - type: Organ
    slotId: legImplant
  - type: AugmentExamine
    color: "#974cf9"
    examineText: augment-examine-runner
    visible: true
  - type: Tag
    tags:
    - LegAugment
    - Augment

- type: entity
  parent: BaseRunnerAugment
  id: RunnerAugmentRight
  name: right runner augment
  description: A cybernetic leg implant. Increases walk and sprint speed by ~10%.
  components:
