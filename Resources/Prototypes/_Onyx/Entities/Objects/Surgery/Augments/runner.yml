    walkMultiplier: 1.10
    sprintMultiplier: 1.10
    augmentId: RunnerRight
  - type: Organ
    slotId: legImplant
  - type: AugmentExamine
    examineText: augment-examine-runner
    visible: true
  - type: Tag
    tags:
    - LegAugment
    - Augment

- type: entity
  parent: BaseRunnerAugment
  id: AdvancedRunnerAugmentLeft
  name: advanced left runner augment
  description: An advanced cybernetic leg implant. Increases walk and sprint speed by ~25%.
  components:
