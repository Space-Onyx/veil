- type: entity
  parent: BaseAugmentAction
  id: ActionAugmentNeuroInterface
  name: Open Neuro-Interface
  description: Open the neuro-interface control panel.

- type: entity
  abstract: true
  parent: BaseItem
  id: BaseIncompleteAugmentNeuroInterface
  description: An implantable neuro-interface unit. This one is incomplete.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
  - type: Item
    size: Huge
  - type: Construction
    graph: AugmentNeuroInterface

- type: entity
  parent: BaseIncompleteAugmentNeuroInterface
  id: AugmentNeuroInterfaceCasing
  name: neuro-interface casing
  components:
  - type: Sprite
    state: incomplete_charger
  - type: Construction
    node: casing
    defaultTarget: augment
  - type: Tag
    tags: [ AugmentNeuroInterfaceCasing ]

- type: entity
  parent: BaseIncompleteAugmentNeuroInterface
  id: AugmentNeuroInterfaceCables
  name: neuro-interface casing with cables
  components:
  - type: Sprite
    state: incomplete_charger_cables
  - type: Construction
    node: cables

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentNeuroInterfaceChip
  name: neuro-interface microchip
  description: A control microchip required to assemble a neuro-interface implant.
  components:
  - type: Tag
    tags: [ AugmentNeuroInterfaceChip ]

- type: entity
  parent: BaseOnyxNeckAugment
  id: AugmentNeuroInterface
  name: neuro-interface
  description: An implanted neuro-interface unit installed at the back of the head.
  components:
  - type: Item
    size: Normal
  - type: Organ
    slotId: neckImplant
  - type: AugmentNeuroInterface
    maxNeuroLoad: 20
  - type: AugmentAction
    action: ActionAugmentNeuroInterface
  - type: AugmentActivatableUI
    key: enum.NeuroInterfaceUiKey.Key
  - type: AugmentEmp
  - type: AugmentExamine
    color: "#00ffff"
    examineText: augment-examine-neuro-interface
    visible: true
  - type: UserInterface
    interfaces:
      enum.NeuroInterfaceUiKey.Key:
        type: NeuroInterfaceBui
  - type: Construction
    graph: AugmentNeuroInterface
    node: augment
  - type: Tag
    tags:
    - Augment
    - neckAugment
