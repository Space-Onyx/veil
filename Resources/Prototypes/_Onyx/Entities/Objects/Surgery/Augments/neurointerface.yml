- type: entity
  parent: BaseAugmentAction
  id: ActionAugmentNeuroInterface
  name: Open Neuro-Interface
  description: Open the neuro-interface control panel.

- type: entity
  abstract: true
  parent: BaseItem
  id: BaseIncompleteAugmentNeuroInterface
  description: An implantable neuro-interface unit. This one is incomplete.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Augments/power.rsi
  - type: Item
    size: Huge
  - type: Construction
    graph: AugmentNeuroInterface

- type: entity
  parent: BaseIncompleteAugmentNeuroInterface
  id: AugmentNeuroInterfaceCasing
  name: neuro-interface casing
  components:
  - type: Sprite
    state: incomplete_cell
  - type: Construction
    node: casing
    defaultTarget: augment
  - type: Tag
    tags: [ AugmentNeuroInterfaceCasing ]

- type: entity
  parent: BaseIncompleteAugmentNeuroInterface
  id: AugmentNeuroInterfaceCables
  name: neuro-interface casing with cables
  components:
  - type: Sprite
    state: incomplete_cell_cables
  - type: Construction
    node: cables

- type: entity
  parent: BaseAugmentElectronics
  id: AugmentNeuroInterfaceChip
  name: neuro-interface microchip
  description: A control microchip required to assemble a neuro-interface implant.
  components:
  - type: Tag
    tags: [ AugmentNeuroInterfaceChip ]

- type: entity
  parent: BaseOnyxNeckAugment
  id: AugmentNeuroInterface
  name: neuro-interface
  description: An implanted neuro-interface unit installed at the back of the head.
  components:
  - type: Item
    size: Normal
  - type: Organ
    slotId: neckImplant
    toolName: surgery-tool-augment-target-neck
    hiddenFromAnalyzer: true
  - type: AugmentNeuroInterface
    maxNeuroLoad: 10
  - type: AugmentNeuroLoad
    passiveLoad: 1
  - type: AugmentModuleSlots
    slots:
    - id: neuro_module_capacity_1
      name: augment-modules-slot-neuro-interface-capacity
      allowInsertWhenUninstalled: true
      allowInsertWhenInstalled: true
      visibleInVerbs: true
      whitelist:
        tags:
        - AugmentModuleNeuroCapacity
    - id: neuro_module_capacity_2
      name: augment-modules-slot-neuro-interface-capacity
      allowInsertWhenUninstalled: true
      allowInsertWhenInstalled: true
      visibleInVerbs: true
      whitelist:
        tags:
        - AugmentModuleNeuroCapacity
    - id: neuro_module_cyberdeck
      name: augment-modules-slot-neuro-interface-cyberdeck
      allowInsertWhenUninstalled: true
      allowInsertWhenInstalled: true
      visibleInVerbs: true
      whitelist:
        tags:
        - AugmentModuleCyberDeck
  - type: AugmentAction
    action: ActionAugmentNeuroInterface
  - type: AugmentActivatableUI
    key: enum.NeuroInterfaceUiKey.Key
  - type: AugmentEmp
  - type: AugmentExamine
    color: "#00ffff"
    examineText: augment-examine-neuro-interface
    visible: true
  - type: UserInterface
    interfaces:
      enum.NeuroInterfaceUiKey.Key:
        type: NeuroInterfaceBui
        interactionRange: 0
        requireInputValidation: false
  - type: Construction
    graph: AugmentNeuroInterface
    node: augment
  - type: Tag
    tags:
    - Augment
    - neckAugment
    - AugmentNeuroInterface

- type: entity
  parent: BaseItem
  id: AugmentModuleNeuroCapacity
  name: neuro-capacity module
  description: A dedicated module that increases neuro-interface max neuro-load.
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: generic
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - AugmentModuleNeuroInterface
    - AugmentModuleNeuroCapacity
  - type: AugmentUniversalModule
    maxNeuroLoad: 5