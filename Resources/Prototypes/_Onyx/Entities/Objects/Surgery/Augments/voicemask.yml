- type: entity
  parent: BaseAction
  id: ActionAugmentVoiceMask
  name: Change Voice Identity
  description: Open the voice mask interface to change your speech identity.
  components:
  - type: InstantAction
    event: !type:VoiceMaskSetNameEvent
    itemIconStyle: NoItem

- type: entity
  parent: BaseAugment
  id: AugmentVoiceMask
  name: voice modulator augment
  description: An implanted voice modulator that allows you to change your voice identity at will. No need for a bulky mask!
  components:
  - type: Sprite
    sprite: _EinsteinEngines/Mobs/Species/IPC/organs.rsi
    state: tongue
  - type: Item
    size: Normal
  - type: Organ
    slotId: headImplant
    hiddenFromAnalyzer: true
  - type: AugmentVoiceMask
  - type: AugmentEmp
  - type: AugmentExamine
    visible: false
  - type: Tag
    tags:
    - Augment
    - headAugment
  - type: UserInterface
    interfaces:
      enum.VoiceMaskUIKey.Key:
        type: VoiceMaskBoundUserInterface