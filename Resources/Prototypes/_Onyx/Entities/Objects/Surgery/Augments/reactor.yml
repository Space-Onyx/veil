- type: entity
  parent: BaseAugmentRecharger
  id: AugmentBioReactor
  name: bio-reactor augment
  description: A metabolic augment recharger that slowly converts nutrition into power.
  components:
  - type: Sprite
    state: apc
  - type: AugmentBioReactor
    chargeRate: 8
    hungerCostPerCharge: 1
    minimumHungerThreshold: Starving
  - type: AugmentEmp
  - type: AugmentExamine
    color: "#49b881"
    examineText: augment-examine-bio-reactor
    visible: true
  - type: Construction
    graph: AugmentBioReactor
    node: bioreactor

- type: entity
  parent: BaseAugmentRecharger
  id: AugmentRTG
  name: RTG augment
  description: A high-end implant reactor that passively generates power without metabolic cost.
  components:
  - type: Sprite
    state: station
  - type: AugmentBioReactor
    chargeRate: 15
    hungerCostPerCharge: 0
    minimumHungerThreshold: Starving
  - type: AugmentEmp
  - type: AugmentExamine
    color: "#d19b2b"
    examineText: augment-examine-riteg
    visible: true
  - type: Construction
    graph: AugmentRTG
    node: rtg
