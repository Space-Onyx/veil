- type: entity
  parent: BaseAction
  id: ActionAugmentHoloPda
  name: augment-holopda-action-open-name
  description: augment-holopda-action-open-desc
  components:
  - type: InstantAction
    event: !type:AugmentHoloPdaOpenEvent
    itemIconStyle: NoItem

- type: entity
  parent: BaseAction
  id: ActionAugmentHoloPdaMedTekScan
  name: augment-holopda-action-medtek-scan-name
  description: augment-holopda-action-medtek-scan-desc
  components:
  - type: Action
    itemIconStyle: BigAction
  - type: TargetAction
    range: 2.5
    deselectOnMiss: true
    interactOnMiss: false
    targetingIndicator: true
  - type: EntityTargetAction
    event: !type:AugmentHoloPdaMedTekScanEvent
    canTargetSelf: true

- type: entity
  parent: BaseOnyxBrainAugment
  id: AugmentHoloPda
  name: HoloPDA augment
  description: A cybernetic PDA unit implanted directly into the brain, providing holographic interface access.
  components:
  - type: AugmentHoloPda
  - type: AugmentEmp
    empVulnerable: false
  - type: AugmentExamine
    visible: false
  - type: AugmentNeuroLoad
    passiveLoad: 2
  - type: Pda
    idSlot:
      name: access-id-card-component-default
      whitelist:
        components:
        - IdCard
    paiSlot:
      priority: -2
      whitelist:
        components:
        - SlotBlock
    penSlot:
      priority: -3
      whitelist:
        tags:
        - SlotBlock
  - type: ContainerContainer
    containers:
      HoloPDA-id: !type:ContainerSlot {}
      Cartridge-Slot: !type:ContainerSlot {}
      program-container: !type:Container
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NanoTaskCartridge
      - NewsReaderCartridge
      - NanoChatCartridge
      - WalletCartridge
    cartridgeSlot:
      priority: -1
      name: device-pda-slot-component-slot-name-cartridge
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        components:
        - Cartridge
  - type: ActivatableUI
    key: enum.PdaUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.PdaUiKey.Key:
        type: PdaBoundUserInterface
      enum.HealthAnalyzerUiKey.Key:
        type: HealthAnalyzerBoundUserInterface
  - type: Organ
    slotId: brainImplant
    toolName: surgery-tool-augment-target-brain
    hiddenFromAnalyzer: true
  - type: Tag
    tags:
    - Augment
    - brainAugment
