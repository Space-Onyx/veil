- type: entity
  abstract: true
  parent: BaseItem
  id: BaseAdminAugmentImplanter
  name: augment implanter
  description: A rapid implanter for augmentation installation with explicit limb targeting.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/implanter.rsi
    state: implanter0
  - type: Item
    sprite: Objects/Specific/Medical/implanter.rsi
    heldPrefix: implanter
    size: Small
  - type: AdminAugmentImplanter
    replaceExisting: true
    oneTimeUse: false

- type: entity
  parent: BaseAdminAugmentImplanter
  id: AdminAugmentImplanterCustom
  suffix: Admeme, Configurable

