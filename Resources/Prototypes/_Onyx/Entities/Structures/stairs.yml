- type: entity
  id: StairsZLevel
  name: stairs
  suffix: Steel
  description: The greatest invention since rocket-propelled grenades.
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    sprite: Structures/stairs.rsi
    state: stairs_steel
    drawdepth: FloorTiles
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: StairsZLevelSteel
    node: stairs
  - type: Physics
    bodyType: Static
  - type: CEZLevelHighGround
    heightCurve:
    - 1.05
    - 1.05
    - 1.05
    - 0.5
    - 0.1
  - type: Fixtures
    fixtures:
      hard:
        shape:
          !type:PhysShapeAabb
          bounds: "1.6,0.4,1.7,0.5"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false
      slowdown:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-0.4,1.5,0.4"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false

