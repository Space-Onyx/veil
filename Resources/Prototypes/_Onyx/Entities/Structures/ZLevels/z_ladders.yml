- type: entity
  id: BaseZLadder
  abstract: true
  name: z-ladder
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _CorvaxNext/Structures/Warps/ladder.rsi
    noRot: true
    netsync: false
    offset: 0, 0.25
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Physics
    canCollide: false
    bodyStatus: OnGround
    bodyType: Static
  - type: Tag
    tags:
      - Structure
  - type: InteractionOutline
  - type: ZLadder

- type: entity
  parent: BaseZLadder
  id: ZLadderUp
  suffix: Up
  components:
  - type: Sprite
    state: ladder_bottom
  - type: ZLadder
    direction: Up

- type: entity
  parent: BaseZLadder
  id: ZLadderDown
  suffix: Down
  components:
  - type: Sprite
    state: ladder_top
  - type: ZLadder
    direction: Down
