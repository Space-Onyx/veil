- type: entity
  abstract: true
  name: gas destroyer
  description: Gases flow into this massive vent and are destroyed.
  id: GasDestroyerBase
  placement:
    mode: SnapgridCenter
  components:
    - type: Clickable
    - type: InteractionOutline
    - type: Physics
      canCollide: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: .4
          density: 190
          mask:
            - MachineMask
    - type: Transform
      anchored: true
    - type: Anchorable
      flags:
      - Anchorable
    - type: Pullable
    - type: Sprite
      sprite: Structures/Piping/Atmospherics/miners.rsi
      state: miner
    - type: AtmosDevice
    - type: GasDestroyer
      destroyAmount: 400
    - type: GuideHelp
      guides:
      - GasMiningAndStorage

- type: entity
  name: O2 gas destroyer
  parent: GasDestroyerBase
  id: GasDestroyerOxygen
  components:
    - type: GasDestroyer
      destroyGas: Oxygen

- type: entity
  name: N2 gas destroyer
