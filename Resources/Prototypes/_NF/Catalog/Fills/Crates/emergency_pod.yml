- type: entity
  parent: MedicalPodVapor
  id: MedicalPodFilled
  suffix: Filled, Random
  components:
  - type: StorageFill
    contents:
    - id: RandomServiceCorpseSpawner
      orGroup: body
      prob: 0.25
    - id: RandomMedicCorpseSpawner
      orGroup: body
      prob: 0.2
    - id: RandomEngineerCorpseSpawner
      orGroup: body
      prob: 0.15
    - id: RandomEngineerCorpseSpawner
      orGroup: body
      prob: 0.15
    - id: RandomScienceCorpseSpawner
      orGroup: body
      prob: 0.1
    - id: RandomSecurityCorpseSpawner
      orGroup: body
      prob: 0.1
    - id: RandomCommandCorpseSpawner
      orGroup: body
      prob: 0.05
  - type: Sprite # Fix our initial state (occupied, occupied-unlit visible).  This sucks.
    noRot: true
    sprite: _NF/Structures/Storage/emergency_pod.rsi
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: window-closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: antenna-unlit
      shader: unshaded
    - state: healthanalyzer-unlit
      shader: unshaded
      map: ["healthanalyzer"]
    - state: occupied-unlit
      shader: unshaded
      map: ["occupied"]
