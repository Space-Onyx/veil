- type: entity
  parent: [AntagPlanetContravendPreset, VendingMachine]
  id: VendingMachineSyndieContraband # Ported from Frontier
  name: ContraVend
  description: Wanted across multiple sectors!
  components:
  - type: VendingMachine
    pack: EmptyVendingMachineInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
    screenState: screen
  - type: Advertise
    pack: SyndieDrobeAds
  - type: Sprite
    sprite: _NF/Structures/Machines/VendingMachines/contravend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: "screen"
      map: ["enum.VendingMachineVisualLayers.Screen"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.3
    color: "#ad2c2b"
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Telecrystal: 100
  - type: Tag
    tags:
      - ContravendUplink

- type: entity
  id: BaseCiviMedVend
  abstract: true
  components:
  - type: VendingMachine
    pack: CiviMedVendInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    # ejectState: eject-unshaded  No sprite, see chefvend/dinnerware/BODA/etc for expamples
  - type: Advertise
    pack: CiviMedAds
  - type: SpeakOnUIClosed
    pack: CiviMedGoodbyes
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4b93ad"
  - type: Sprite
    sprite: _NF/Structures/Machines/VendingMachines/civimed.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

- type: entity
  parent: [BaseCiviMedVend, VendingMachine]
  id: VendingMachineCiviMedPlus
  name: CiviMed Plus
  description: CiviMed Plus, distributing lifesaving meds harder than the rocks you break! Miners, DON'T DIE!

- type: entity
  parent: [BaseCiviMedVend, VendingMachineWallmount]
  id: VendingMachineCiviMed
  name: CiviMed
  description: CiviMed, distributing lifesaving meds harder than the rocks you break! Miners, DON'T DIE!
  components:
  - type: Sprite
    sprite: _NF/Structures/Machines/VendingMachines/wallcivimed.rsi