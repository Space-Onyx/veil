- type: entity
  parent: GasPipeBase
  id: UtopiaGasZPipeStraightUp
  name: gas pipe
  suffix: Straight, Up
  placement:
    mode: AlignAtmosPipeLayers
  components:
  - type: NodeContainer
    nodes:
      pipe:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: Longitudinal
      zUp:
        !type:ZPipeNode
        nodeGroupID: Pipe
        zDirection: Up
  - type: ZPipe
  - type: ZLevelTransmitter
    allowUp: true
  - type: ZLevelEntityLink
  - type: AtmosDevice
  # <Onyx-Tweak>
  - type: Construction
    graph: ZPipeUp
    node: pipe
  - type: Sprite
    sprite: Structures/Piping/Atmospherics/gascanisterport.rsi
    layers:
      - sprite: Structures/Piping/Atmospherics/pipe.rsi
        state: pipeBinaryConnectors
        map: [ "enum.PipeVisualLayers.Pipe" ]
      - state: gasCanisterPort
  # </Onyx-Tweak>

