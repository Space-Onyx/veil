- type: entity
  id: UtopiaZDisposalPipeUp
  parent: DisposalPipe
  name: Z-level disposal pipe
  description: A disposal pipe capable of transferring contents between Z-levels.
  components:
  - type: ZLevelEntityLink
  - type: ZLevelTransmitter
    allowUp: true
    allowDown: false
    range: 0.08
  - type: ZDisposalPipe
    zDirection: Up

